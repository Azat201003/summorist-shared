syntax = "proto3";

option go_package = "github.com/Azat201003/summorist-shared/gen/go/mores;mores";
package mores;

import "google/api/annotations.proto";

service Mores {
  // Get list of metas by filter
  rpc GetFiltered(Filter) returns (stream Meta) {
    option (google.api.http) = {
      get: "/mores"
    };
  }
  // Downloading by parts, if you have permissions
  rpc DownloadMore(DownloadRequest) returns (stream Part) {
    option (google.api.http) = {
      post: "/mores/download/{data.more_id}"
      body: "*"
    };
  }
  // Uploading an existing more, if you have permissions
  rpc UploadMore(stream UploadRequest) returns (Meta) {
    option (google.api.http) = {
      post: "/mores/upload"
      body: "*"
    };
  }
  // Removing more(mark as removed) by id, if you have permissions, returns meta of deleted more
  rpc RemoveMore(RemoveRequest) returns (Meta) {
    option (google.api.http) = {
      delete: "/mores"
    };
  }
  // Create more
  rpc CreateMore(CreateRequest) returns (Meta) {
    option (google.api.http) = {
      post: "/mores"
      body: "*"
    };
  }
}

message CreateRequest {
  string title = 1;
  string descripiton = 2;
  string jwt_token = 3;
}

message Meta {
	string title = 1;
	string descripiton = 2;
	uint64 creator_id = 3;
	uint64 more_id = 4;
}

message ExchangeData {
	uint64 more_id = 1;
	uint32 block_size = 2;
	string jwt_token = 3; // Only for upload
}

message DownloadRequest {
	ExchangeData data = 1;
	bool converted = 2;
}

message Filter {
	string query = 1;
	uint64 creator_id = 2;
	uint64 more_id = 3;
}

message UploadRequest {
	oneof request {
		ExchangeData data = 1; // Only first message
		Part part = 2;
	}
}

message RemoveRequest {
	uint64 more_id = 1;     
	string jwt_token = 2;
}

message Part {
	uint32 number = 1;
	uint32 size = 2;
	bytes data = 3;
}

